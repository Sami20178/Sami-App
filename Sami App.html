<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    background:#212121;
}

/* Seitenleiste */
.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:70px;
    height:100vh;
    background:#171717;
    border-right:1px solid #333;
    transition:0.3s;
    overflow:hidden;
}

.sidebar.open{
    width:220px;
}

.menu-btn{
    width:50px;
    height:50px;
    margin:10px;
    border:none;
    border-radius:12px;
    background:#2a2a2a;
    color:white;
    font-size:20px;
    cursor:pointer;
}

.menu-btn:hover{
    background:#3a3a3a;
}

.item{
    display:flex;
    align-items:center;
    gap:12px;
    color:white;
    padding:12px;
    margin:6px;
    border-radius:10px;
    cursor:pointer;
    white-space:nowrap;
}

.item:hover{
    background:#2a2a2a;
}

.text{
    display:none;
}

.sidebar.open .text{
    display:inline;
}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">

    <button class="menu-btn" onclick="toggleSidebar()">☰</button>

    <div class="item">
        <span>➕</span>
        <span class="text">Neuer Chat</span>
    </div>

    <div class="item">
        <span>💬</span>
        <span class="text">Chats</span>
    </div>

    <div class="item">
        <span>⚙️</span>
        <span class="text">Einstellungen</span>
    </div>

</div>

<script>
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("open");
}
</script>

</body>
</html>
