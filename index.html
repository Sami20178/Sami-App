<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sami App</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0f0f0f;
color:white;
overflow:hidden;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:260px;
height:100vh;
background:#171717;
transition:0.3s;
overflow:hidden;
}

.sidebar.closed{
width:64px;
}

.top{
height:65px;
display:flex;
align-items:center;
gap:12px;
padding:0 15px;
}

.menu-btn{
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
cursor:pointer;
}

.menu-btn:hover{
background:#2a2a2a;
}

.logo{
font-size:18px;
font-weight:600;
white-space:nowrap;
}

.item{
display:flex;
align-items:center;
gap:14px;
padding:12px 15px;
cursor:pointer;
border-radius:10px;
margin:4px 8px;
}

.item:hover{
background:#2a2a2a;
}

.text{
white-space:nowrap;
}

.sidebar.closed .text,
.sidebar.closed .logo{
display:none;
}

.main{
margin-left:260px;
padding:30px;
transition:0.3s;
}

.sidebar.closed + .main{
margin-left:70px;
}

.material-symbols-outlined{
font-size:28px;
}

h1{
font-size:32px;
}

p{
margin-top:10px;
color:#bdbdbd;
}

.item a{
display:flex;
align-items:center;
gap:14px;
width:100%;
color:white;
text-decoration:none;
}

.item a:hover{
color:white;
}

.sidebar.closed .item a .text{
display:none;
}

.SamiAppIcon{
display:flex;
align-items:center;
gap:14px;
width:100%;
padding:10px;
background:#2a2a2a;
border:1px solid #3a3a3a;
border-radius:10px;
min-height:48px;
color:white;
text-decoration:none;

  .SamiAppIcon{
background:#2a2a2a;
border:1px solid #3a3a3a;
border-radius:10px;
min-height:48px;
}
}

.SamiAppIcon,
.SamiGamesIcon,
.SamiFaceIcon,
.SamiAIIcon{
display:flex;
align-items:center;
gap:6px;
width:100%;
padding:10px;
text-decoration:none;
color:white;
}

  
.home-icon{
color:#111;
}

 .SamiAppIcon{
display:flex;
align-items:center;
justify-content:center;
width:48px;
height:48px;
background:#2a2a2a;
border:1px solid #3a3a3a;
border-radius:14px;
color:white;
text-decoration:none;
margin:auto;
}

  
.SamiAppIcon .text{
display:none;
} 

.sidebar:not(.closed) .SamiAppIcon{
width:100%;
justify-content:flex-start;
padding-left:12px;
gap:8px;
}

.sidebar:not(.closed) .SamiAppIcon .text{
display:inline;
}

.sidebar.closed .SamiAppIcon{
width:48px;
height:48px;
margin-left:0;
}

.sidebar.closed .SamiGamesIcon,
.sidebar.closed .SamiFaceIcon,
.sidebar.closed .SamiAIIcon{
width:48px;
height:48px;
justify-content:center;
}

.sidebar.closed .item{
display:flex;
justify-content:center;
align-items:center;
padding:0;
margin:8px 0;
}

.sidebar.closed a{
display:flex;
justify-content:center;
align-items:center;
width:48px;
height:48px;
}

.sidebar.closed .text,
.sidebar.closed .logo{
display:none;
}  
</style>
</head>
<body>

<div class="sidebar" id="sidebar">

<div class="top">

<div class="menu-btn" onclick="toggleMenu()">
<span class="material-symbols-outlined">menu</span>
</div>

<div class="logo">Sami App</div>

</div>

<div class="item">
<a href="" class="SamiAppIcon">
<span class="material-symbols-outlined home-icon">home</span>
<span class="text">Sami App</span>
  </a>
</div>
 
<div class="item">
  <a href="" class="SamiGamesIcon">
<span class="material-symbols-outlined">stadia_controller</span>
<span class="text">Sami Games</span>
</a>
</div>

<div class="item">
  <a href="" class="SamiFaceIcon">
<span class="material-symbols-outlined">face</span>
<span class="text">Sami Face</span>
    </a>
</div>

<div class="item">
  <a href="" class="SamiAIIcon">
<span class="material-symbols-outlined">smart_toy</span>
<span class="text">Sami AI</span>
    </a>
</div>

</div>

<div class="main">
<h1>Willkommen bei Sami App</h1>
<p>Deine eigene App Oberfläche.</p>
</div>

<script>
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("closed");
}
</script>

</body>
</html>
